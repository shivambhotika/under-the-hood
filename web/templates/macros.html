{% macro confidence_badge(tier, tooltip='') %}
<span class="confidence-badge confidence-{{ tier | lower }}"
      title="{{ tooltip }}"
      data-tooltip="{{ tooltip }}">
  {% if tier == 'High' %}● High confidence
  {% elif tier == 'Medium' %}● Medium confidence
  {% else %}● Early signal{% endif %}
</span>
{% endmacro %}

{% macro trend_badge(is_reliable) %}
{% if not is_reliable %}
<span class="confidence-badge confidence-low" title="Trend not stable yet — fewer than 4 weekly data points collected">
  ⏳ Trend building
</span>
{% endif %}
{% endmacro %}
