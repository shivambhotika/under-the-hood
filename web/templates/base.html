<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block page_title %}{{ page_title }} · Under The Hood{% endblock %}</title>
  <meta property="og:title" content="{% block og_title %}{{ page_title }} · Under The Hood{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}Open-source tool intelligence backed by real adoption data.{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">🔧 Under The Hood</div>
      <div class="brand-sub">OSS Tool Intelligence</div>
      <nav>
        <a href="{{ url_for('home') }}" class="nav-link {% if active in ['home', 'explore'] or request.path == '/' %}active{% endif %}">Home</a>
        <a href="{{ url_for('find') }}" class="nav-link {% if active == 'find' %}active{% endif %}">Find</a>
        <a href="{{ url_for('market') }}" class="nav-link {% if active == 'market' %}active{% endif %}">Markets</a>
        <a href="{{ url_for('alternatives_index') }}" class="nav-link {% if active == 'alternatives' %}active{% endif %}">Alternatives</a>
        <a href="{{ url_for('mcp_directory') }}" class="nav-link {% if active == 'mcp' %}active{% endif %}">MCP <span class="nav-badge-new">new</span></a>
        <a href="{{ url_for('audit') }}" class="nav-link {% if active == 'audit' %}active{% endif %}">Audit</a>
      </nav>
      <div class="sidebar-footer">
        Data: GitHub API<br>
        Updated: Weekly<br>
        Repos tracked: 500+ stars
        <div class="sidebar-secondary-links">
          <a class="ops-link" href="{{ url_for('tool_detail') }}">tools</a>
          <a class="ops-link" href="{{ url_for('health_page') }}">health</a>
          <a class="ops-link" href="{{ url_for('radar') }}">radar</a>
          <a class="ops-link" href="{{ url_for('memo') }}">briefs</a>
        </div>
        <a class="ops-link" href="{{ url_for('ops') }}">ops</a>
      </div>
    </aside>

    <main class="content">
      <a class="mobile-learn-link" href="{{ url_for('learn') }}" aria-label="How to read this">?</a>
      {% block content %}{% endblock %}
    </main>
  </div>
  <nav class="mobile-tabbar" aria-label="Primary navigation">
    <a href="{{ url_for('home') }}" class="mobile-tab {% if request.path == '/' %}active{% endif %}">
      <span class="mobile-tab-icon">🏠</span>
      <span class="mobile-tab-label">Home</span>
    </a>
    <a href="{{ url_for('find') }}" class="mobile-tab {% if active == 'find' %}active{% endif %}">
      <span class="mobile-tab-icon">⌕</span>
      <span class="mobile-tab-label">Find</span>
    </a>
    <a href="{{ url_for('market') }}" class="mobile-tab {% if active == 'market' %}active{% endif %}">
      <span class="mobile-tab-icon">📈</span>
      <span class="mobile-tab-label">Markets</span>
    </a>
    <a href="{{ url_for('alternatives_index') }}" class="mobile-tab {% if active == 'alternatives' %}active{% endif %}">
      <span class="mobile-tab-icon">🔄</span>
      <span class="mobile-tab-label">Alts</span>
    </a>
    <a href="{{ url_for('mcp_directory') }}" class="mobile-tab {% if active == 'mcp' %}active{% endif %}">
      <span class="mobile-tab-icon">🤖</span>
      <span class="mobile-tab-label">MCP</span>
    </a>
  </nav>
  <script>
    document.querySelectorAll('[data-tooltip]').forEach((el) => {
      el.addEventListener('click', function (e) {
        e.stopPropagation();
        document.querySelectorAll('.tooltip-popup').forEach((t) => t.remove());
        const text = this.dataset.tooltip;
        if (!text) return;
        const popup = document.createElement('div');
        popup.className = 'tooltip-popup';
        popup.textContent = text;
        this.appendChild(popup);
        setTimeout(() => popup.remove(), 3000);
      });
    });
    document.addEventListener('click', () => {
      document.querySelectorAll('.tooltip-popup').forEach((t) => t.remove());
    });
  </script>
</body>
</html>
